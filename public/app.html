<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>HyperScope — App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='24' fill='%23121512'/><text x='50' y='73' font-size='62' font-family='monospace' font-weight='700' fill='%238ef23d' text-anchor='middle'>H</text></svg>">
<link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="nav">
  <div class="wrap">
    <div class="brand"><a href="/" style="display:flex;align-items:center;gap:12px"><span class="mark">H</span><b>HyperScope</b></a><span class="crumb" id="crumb">/ APP</span></div>
    <div class="nav-right">
      <span class="ghost" id="aiGhost">AI checking…</span>
      <a class="ghost-link" href="https://github.com/Jr-kenny/hyperscope" target="_blank" rel="noopener">Source</a>
    </div>
  </div>
</div>

<div class="wrap">

  <!-- CATALOG: the list of services you land on -->
  <section class="catalog" id="catalog" hidden>
    <div class="cat-head">
      <h2>Services</h2>
      <p>Pick a tool to run it against live Hyperliquid data. Each one is its own page with a one-click try.</p>
    </div>
    <div class="search">
      <span class="search-ico">⌕</span>
      <input id="svcSearch" placeholder="Search services" autocomplete="off" spellcheck="false">
      <kbd class="search-kbd">/</kbd>
    </div>
    <div class="svc-grid" id="catGrid"></div>
    <div class="cat-empty" id="catEmpty" hidden>No service matches that. Try “vault”, “risk” or “positions”.</div>
  </section>

  <!-- SERVICE PAGE: one service in focus, nothing else -->
  <div class="service" id="workspace" hidden>
    <a class="side-back" href="/app" id="backCatalog">← All services</a>
    <main class="work">
      <div class="work-head">
        <h2 id="wTitle">—</h2>
        <div class="wmeta" id="wMeta"></div>
      </div>
      <p class="work-lead" id="wLead"></p>
      <div id="wForm"></div>
      <div class="out" id="wOut"></div>
    </main>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
const fmtUsd = n => "$"+Number(n).toLocaleString(undefined,{maximumFractionDigits:2});
const fmtUsdC = n => { n=Number(n); if(n>=1e9)return "$"+(n/1e9).toFixed(2)+"B"; if(n>=1e6)return "$"+(n/1e6).toFixed(2)+"M"; if(n>=1e3)return "$"+(n/1e3).toFixed(1)+"K"; return "$"+n.toFixed(0); };
const fmtNum = n => Number(n).toLocaleString(undefined,{maximumFractionDigits:4});
const pct = n => (Number(n)*100).toFixed(2)+"%";
// Unbounded ratios (Sharpe/Sortino/Calmar) blow up on tiny or near-zero-vol
// samples; round to 2dp, and cap absurd magnitudes so they don't overflow the
// card. null/non-finite (e.g. a zero-drawdown Calmar) shows as ∞.
const fmtRatio = x => (x==null||!isFinite(Number(x))) ? "∞"
  : Math.abs(x)>=1000 ? (x>0?">999":"<-999") : Number(x).toFixed(2);
const short = a => a.slice(0,6)+"…"+a.slice(-4);
const hlLink = a => `https://app.hyperliquid.xyz/explorer/address/${a}`;
const signCls = n => Number(n)>=0?"pos":"neg";
const addr = v => /^0x[a-fA-F0-9]{40}$/.test((v||"").trim());

async function call(path, opts){ const r=await fetch(path,opts); const j=await r.json(); if(j.error) throw new Error(j.error); return j.data; }

let aiOn=false;

/* service registry */
const SERVICES = {
  positions: {
    icon:"P", name:"Wallet Positions", sub:"POST",
    desc:"Open perpetual positions for any wallet, normalized: side, size, entry, value, uPnL, ROE, liquidation, leverage.",
    title:"Wallet Positions", meta:['<span class="mbadge method">POST</span>','<span class="mbadge">SLA &lt; 2s</span>'],
    lead:"Open perpetual positions for any wallet, fully normalized.",
    form:`<p class="field">Wallet address</p><div class="row"><input id="in" placeholder="0x… wallet address" spellcheck="false"><button class="run" id="go">Run</button></div>
      <div class="row" style="margin-top:10px"><span class="chip" data-val="0xd6e56265890b76413d1d527eb9b75e334c0c5b42">try: active trader</span></div>`,
    run: async (out)=>{ const w=$("#in").value.trim(); if(!addr(w)) return err(out,"Enter a valid 0x wallet address.");
      load(out,"Loading positions…"); const d=await call("/positions",P({wallet:w})); renderPositions(d,out); }
  },
  airisk: {
    icon:"✦", name:"AI Risk Read", sub:"AI · POST", ai:true,
    desc:"A grounded risk assessment of a wallet's positions: risk level, net directional bias, and the signals behind it.",
    title:"AI Risk Read", meta:['<span class="mbadge ai">✦ AI</span>','<span class="mbadge method">POST</span>'],
    lead:"Feed a wallet's positions to a model and get a grounded risk assessment.",
    form:`<p class="field">Wallet address</p><div class="row"><input id="in" placeholder="0x… wallet address" spellcheck="false"><button class="run lime" id="go">✦ Analyze</button></div>
      <div class="row" style="margin-top:10px"><span class="chip" data-val="0xd6e56265890b76413d1d527eb9b75e334c0c5b42">try: active trader</span></div>`,
    run: async (out)=>{ const w=$("#in").value.trim(); if(!addr(w)) return err(out,"Enter a valid 0x wallet address.");
      if(!aiOn) return out.innerHTML=aiNote(); load(out,"✦ Reading risk… (model thinking)");
      const d=await call("/analyze/positions",P({wallet:w})); renderRisk(d.analysis,out); }
  },
  vault: {
    icon:"V", name:"Vault Review", sub:"POST",
    desc:"Full breakdown of a single vault: leader, strategy, APR, followers, commission, deposit and withdraw capacity.",
    title:"Vault Review", meta:['<span class="mbadge method">POST</span>','<span class="mbadge">SLA &lt; 2s</span>'],
    lead:"Full breakdown of a single vault.",
    form:`<p class="field">Vault address</p><div class="row"><input id="in" placeholder="0x… vault address" spellcheck="false"><button class="run" id="go">Run</button></div>
      <div class="row" style="margin-top:10px"><span class="chip" data-val="0xdfc24b077bc1425ad1dea75bcb6f8158e10df303">try: HLP vault</span></div>`,
    run: async (out)=>{ const v=$("#in").value.trim(); if(!addr(v)) return err(out,"Enter a valid 0x vault address.");
      load(out,"Loading vault…"); const d=await call("/vault",P({vault:v})); renderVault(d,out); }
  },
  aivault: {
    icon:"✦", name:"AI Vault Verdict", sub:"AI · POST", ai:true,
    desc:"Due diligence on a vault, then a follow / watch / avoid verdict with a score and the case for and against.",
    title:"AI Vault Verdict", meta:['<span class="mbadge ai">✦ AI</span>','<span class="mbadge method">POST</span>'],
    lead:"Due diligence on a vault, then a follow / watch / avoid verdict.",
    form:`<p class="field">Vault address</p><div class="row"><input id="in" placeholder="0x… vault address" spellcheck="false"><button class="run lime" id="go">✦ Get verdict</button></div>
      <div class="row" style="margin-top:10px"><span class="chip" data-val="0xdfc24b077bc1425ad1dea75bcb6f8158e10df303">try: HLP vault</span></div>`,
    run: async (out)=>{ const v=$("#in").value.trim(); if(!addr(v)) return err(out,"Enter a valid 0x vault address.");
      if(!aiOn) return out.innerHTML=aiNote(); load(out,"✦ Running due diligence… (model thinking)");
      const d=await call("/analyze/vault",P({vault:v})); renderVerdict(d.analysis,out); }
  },
  vaults: {
    icon:"D", name:"Discover Vaults", sub:"GET",
    desc:"A sortable shortlist across every live vault. Rank by TVL, APR or age, out of thousands.",
    title:"Discover Vaults", meta:['<span class="mbadge method">GET</span>','<span class="mbadge">cached</span>'],
    lead:"A sortable shortlist across every live vault.",
    form:`<p class="field">Query</p><div class="row">
      <select id="sortIn"><option value="tvl">Sort by TVL</option><option value="apr">Sort by APR</option><option value="createTimeMillis">Sort by newest</option></select>
      <select id="orderIn"><option value="desc">High to low</option><option value="asc">Low to high</option></select>
      <select id="limitIn"><option value="10">Top 10</option><option value="25" selected>Top 25</option><option value="50">Top 50</option></select>
      <button class="run" id="go">Run</button></div>`,
    run: async (out)=>{ const sort=$("#sortIn").value,order=$("#orderIn").value,limit=$("#limitIn").value;
      load(out,"Loading vaults…"); const d=await call(`/vaults?sort=${sort}&order=${order}&limit=${limit}`); renderVaults(d,out); }
  },
  coin: {
    icon:"C", name:"Coin Market", sub:"POST",
    desc:"Mark, oracle and mid price, funding (hourly and annualized), open interest, 24h volume and change for any perp.",
    title:"Coin Market & Funding", meta:['<span class="mbadge method">POST</span>','<span class="mbadge">SLA &lt; 2s</span>'],
    lead:"Live market context an agent needs before it sizes a perp: price, funding, open interest, volume.",
    form:`<p class="field">Coin symbol</p><div class="row"><input id="in" placeholder="BTC, ETH, SOL…" spellcheck="false"><button class="run" id="go">Run</button></div>
      <div class="row" style="margin-top:10px"><span class="chip" data-val="BTC">try: BTC</span><span class="chip" data-val="ETH">try: ETH</span><span class="chip" data-val="SOL">try: SOL</span></div>`,
    run: async (out)=>{ const c=$("#in").value.trim(); if(!c) return err(out,"Enter a coin symbol, e.g. BTC.");
      load(out,"Loading market…"); const d=await call("/coin",P({coin:c})); renderCoin(d,out); }
  },
  book: {
    icon:"B", name:"Order Book", sub:"POST",
    desc:"Best bid and ask, mid, spread in bps and resting depth on each side, so an agent can check liquidity before sizing.",
    title:"Order Book Depth", meta:['<span class="mbadge method">POST</span>','<span class="mbadge">SLA &lt; 2s</span>'],
    lead:"Top of book and resting depth for any perp: spread, and how much size sits on each side.",
    form:`<p class="field">Coin symbol</p><div class="row"><input id="in" placeholder="BTC, ETH, SOL…" spellcheck="false"><button class="run" id="go">Run</button></div>
      <div class="row" style="margin-top:10px"><span class="chip" data-val="BTC">try: BTC</span><span class="chip" data-val="ETH">try: ETH</span></div>`,
    run: async (out)=>{ const c=$("#in").value.trim(); if(!c) return err(out,"Enter a coin symbol, e.g. BTC.");
      load(out,"Loading book…"); const d=await call("/book",P({coin:c,depth:10})); renderBook(d,out); }
  },
  fills: {
    icon:"H", name:"Trade History", sub:"POST",
    desc:"A wallet's recent fills with realized PnL, win rate and volume: the track record, not just the current snapshot.",
    title:"Wallet Trade History", meta:['<span class="mbadge method">POST</span>','<span class="mbadge">SLA &lt; 2s</span>'],
    lead:"Recent fills for a wallet with realized PnL, win rate and volume.",
    form:`<p class="field">Wallet address</p><div class="row"><input id="in" placeholder="0x… wallet address" spellcheck="false"><button class="run" id="go">Run</button></div>
      <div class="row" style="margin-top:10px"><span class="chip" data-val="0xd6e56265890b76413d1d527eb9b75e334c0c5b42">try: active trader</span></div>`,
    run: async (out)=>{ const w=$("#in").value.trim(); if(!addr(w)) return err(out,"Enter a valid 0x wallet address.");
      load(out,"Loading fills…"); const d=await call("/fills",P({wallet:w,limit:50})); renderFills(d,out); }
  },
  compare: {
    icon:"≡", name:"Vault Compare", sub:"POST",
    desc:"Put several vaults side by side, ranked by APR, with followers, leader fee and size: a quick strategy shortlist.",
    title:"Vault Compare", meta:['<span class="mbadge method">POST</span>','<span class="mbadge">SLA &lt; 2s</span>'],
    lead:"Two or more vaults side by side, ranked by APR.",
    form:`<p class="field">Vault addresses (comma separated)</p><div class="row"><input id="in" placeholder="0x…, 0x…" spellcheck="false"><button class="run" id="go">Run</button></div>
      <div class="row" style="margin-top:10px"><span class="chip" data-val="0xdfc24b077bc1425ad1dea75bcb6f8158e10df303, 0xb0a55f13d22f66e6d495ac98113841b2326e9540">try: two HLP vaults</span></div>`,
    run: async (out)=>{ const list=$("#in").value.split(/[\s,]+/).map(s=>s.trim()).filter(Boolean);
      if(list.length<2) return err(out,"Enter at least two 0x vault addresses, comma separated.");
      load(out,"Comparing vaults…"); const d=await call("/compare",P({vaults:list})); renderCompare(d,out); }
  },
  // ---- monitoring + evaluation services -----------------------------------
  metrics: {
    icon:"M", name:"Strategy Metrics", sub:"EVAL · POST",
    desc:"Sharpe, Sortino, Calmar, profit factor, expectancy, win/loss stats, max drawdown, PnL concentration by coin, and monthly heatmap data from a wallet's trade history.",
    title:"Strategy Metrics", meta:['<span class="mbadge method">POST</span>','<span class="mbadge">EVAL</span>'],
    lead:"Performance ratios from a wallet's trade history.",
    form:`<p class="field">Wallet address</p><div class="row"><input id="in" placeholder="0x… wallet address" spellcheck="false"><button class="run" id="go">Run</button></div>
      <div class="row" style="margin-top:10px"><span class="chip" data-val="0xd6e56265890b76413d1d527eb9b75e334c0c5b42">try: active trader</span></div>`,
    run: async (out)=>{ const w=$("#in").value.trim(); if(!addr(w)) return err(out,"Enter a valid 0x wallet address.");
      load(out,"Computing metrics…"); const d=await call("/metrics",P({wallet:w})); renderMetrics(d,out); }
  },
  exposure: {
    icon:"E", name:"Position Exposure", sub:"MONITOR · POST",
    desc:"Live exposure breakdown: long/short notional, net bias, per-coin concentration, leverage distribution, liquidation proximity. The monitoring layer.",
    title:"Position Exposure", meta:['<span class="mbadge method">POST</span>','<span class="mbadge">MONITOR</span>'],
    lead:"Live exposure breakdown from open positions.",
    form:`<p class="field">Wallet address</p><div class="row"><input id="in" placeholder="0x… wallet address" spellcheck="false"><button class="run" id="go">Run</button></div>
      <div class="row" style="margin-top:10px"><span class="chip" data-val="0xd6e56265890b76413d1d527eb9b75e334c0c5b42">try: active trader</span></div>`,
    run: async (out)=>{ const w=$("#in").value.trim(); if(!addr(w)) return err(out,"Enter a valid 0x wallet address.");
      load(out,"Loading exposure…"); const d=await call("/exposure",P({wallet:w})); renderExposure(d,out); }
  },
  equity: {
    icon:"📈", name:"Equity Curve", sub:"MONITOR · POST",
    desc:"Reconstructed realized equity curve from fills, funding, and deposits/withdrawals. Plotting-ready point series.",
    title:"Equity Curve", meta:['<span class="mbadge method">POST</span>','<span class="mbadge">MONITOR</span>'],
    lead:"Realized equity reconstructed from fills, funding, and capital flows.",
    form:`<p class="field">Wallet address</p><div class="row"><input id="in" placeholder="0x… wallet address" spellcheck="false"><button class="run" id="go">Run</button></div>
      <div class="row" style="margin-top:10px"><span class="chip" data-val="0xd6e56265890b76413d1d527eb9b75e334c0c5b42">try: active trader</span></div>`,
    run: async (out)=>{ const w=$("#in").value.trim(); if(!addr(w)) return err(out,"Enter a valid 0x wallet address.");
      load(out,"Reconstructing equity…"); const d=await call("/equity_curve",P({wallet:w})); renderEquity(d,out); }
  },
  equity_mtm: {
    icon:"💹", name:"MTM Equity", sub:"MONITOR · POST",
    desc:"Continuous mark-to-market account value over time from Hyperliquid's native portfolio history, with drawdown. The live-equity counterpart to the realized curve.",
    title:"Mark-to-Market Equity", meta:['<span class="mbadge method">POST</span>','<span class="mbadge">MONITOR</span>'],
    lead:"Continuous account value (margin + uPnL) straight from Hyperliquid's portfolio history.",
    form:`<p class="field">Wallet address</p><div class="row"><input id="in" placeholder="0x… wallet address" spellcheck="false">
      <select id="periodIn"><option value="allTime" selected>All time</option><option value="month">Month</option><option value="week">Week</option><option value="day">Day</option></select>
      <button class="run" id="go">Run</button></div>
      <div class="row" style="margin-top:10px"><span class="chip" data-val="0xd6e56265890b76413d1d527eb9b75e334c0c5b42">try: active trader</span></div>`,
    run: async (out)=>{ const w=$("#in").value.trim(); if(!addr(w)) return err(out,"Enter a valid 0x wallet address.");
      const period=$("#periodIn").value; load(out,"Loading account value…"); const d=await call("/equity_mtm",P({wallet:w,period})); renderMtm(d,out); }
  },
  dd: {
    icon:"📉", name:"Drawdown", sub:"MONITOR · POST",
    desc:"Underwater curve and drawdown stats: max DD, average DD, max duration, current DD.",
    title:"Drawdown Analysis", meta:['<span class="mbadge method">POST</span>','<span class="mbadge">MONITOR</span>'],
    lead:"How deep and how long the wallet went underwater.",
    form:`<p class="field">Wallet address</p><div class="row"><input id="in" placeholder="0x… wallet address" spellcheck="false"><button class="run" id="go">Run</button></div>
      <div class="row" style="margin-top:10px"><span class="chip" data-val="0xd6e56265890b76413d1d527eb9b75e334c0c5b42">try: active trader</span></div>`,
    run: async (out)=>{ const w=$("#in").value.trim(); if(!addr(w)) return err(out,"Enter a valid 0x wallet address.");
      load(out,"Computing drawdown…"); const d=await call("/drawdown",P({wallet:w})); renderDrawdown(d,out); }
  },
  tearsheet: {
    icon:"📋", name:"Tearsheet", sub:"EVAL · POST",
    desc:"One-call strategy evaluation rollup: metrics, exposure, equity curve, and drawdown. Everything to evaluate a wallet in a single call.",
    title:"Full Tearsheet", meta:['<span class="mbadge method">POST</span>','<span class="mbadge">EVAL</span>'],
    lead:"Metrics + exposure + equity + drawdown in one call.",
    form:`<p class="field">Wallet address</p><div class="row"><input id="in" placeholder="0x… wallet address" spellcheck="false"><button class="run" id="go">Run</button></div>
      <div class="row" style="margin-top:10px"><span class="chip" data-val="0xd6e56265890b76413d1d527eb9b75e334c0c5b42">try: active trader</span></div>`,
    run: async (out)=>{ const w=$("#in").value.trim(); if(!addr(w)) return err(out,"Enter a valid 0x wallet address.");
      load(out,"Building tearsheet…"); const d=await call("/tearsheet",P({wallet:w})); renderTearsheet(d,out); }
  },
  aiperf: {
    icon:"✦", name:"AI Performance Read", sub:"AI · EVAL · POST", ai:true,
    desc:"Full track record analysis: fills metrics + exposure + equity curve fed to a model for an edge assessment. Real, fading, or absent.",
    title:"AI Performance Read", meta:['<span class="mbadge ai">✦ AI</span>','<span class="mbadge method">POST</span>'],
    lead:"Is this wallet's edge real, fading, or absent?",
    form:`<p class="field">Wallet address</p><div class="row"><input id="in" placeholder="0x… wallet address" spellcheck="false"><button class="run lime" id="go">✦ Analyze</button></div>
      <div class="row" style="margin-top:10px"><span class="chip" data-val="0xd6e56265890b76413d1d527eb9b75e334c0c5b42">try: active trader</span></div>`,
    run: async (out)=>{ const w=$("#in").value.trim(); if(!addr(w)) return err(out,"Enter a valid 0x wallet address.");
      if(!aiOn) return out.innerHTML=aiNote(); load(out,"✦ Evaluating performance… (model thinking)");
      const d=await call("/analyze/performance",P({wallet:w})); renderPerformance(d.analysis,out); }
  }
};
const order=["positions","airisk","fills","metrics","exposure","equity","equity_mtm","dd","tearsheet","aiperf","coin","book","vault","aivault","vaults","compare"];
const P = body => ({method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
const load=(out,m)=>out.innerHTML=`<div class="status">${m}</div>`;
const err=(out,m)=>out.innerHTML=`<div class="status err">${m}</div>`;
const aiNote=()=>`<div class="ai-panel"><div class="ai-bar">✦ AI offline</div><div class="ai-body"><div class="ai-note">Set <span class="mono">NVIDIA_API_KEY</span> (free at build.nvidia.com) to enable AI analysis on this instance.</div></div></div>`;

/* renderers */
function renderPositions(d,out){
  if(!d.count) return out.innerHTML=`<div class="status">No open positions for this wallet.</div>`;
  const rows=d.positions.map(p=>`<tr><td class="name-sans">${p.coin}</td><td class="${p.side}">${p.side.toUpperCase()}</td>
    <td>${fmtNum(p.size)}</td><td>${fmtUsd(p.entryPrice)}</td><td>${fmtUsd(p.positionValue)}</td>
    <td class="${signCls(p.unrealizedPnl)}">${fmtUsd(p.unrealizedPnl)}</td><td class="${signCls(p.returnOnEquity)}">${pct(p.returnOnEquity)}</td>
    <td>${p.liquidationPrice!=null?fmtUsd(p.liquidationPrice):"—"}</td><td>${p.leverage.value}× ${p.leverage.type}</td></tr>`).join("");
  out.innerHTML=`<div class="status">${d.count} open position${d.count>1?"s":""}</div>
    <div class="tbl-wrap"><table><thead><tr><th>Coin</th><th>Side</th><th>Size</th><th>Entry</th><th>Value</th><th>uPnL</th><th>ROE</th><th>Liq.</th><th>Leverage</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}
function renderRisk(a,out){ out.innerHTML=`<div class="ai-panel"><div class="ai-bar">✦ AI risk read</div><div class="ai-body">
  <div class="verdict-row"><span class="badge-lvl lvl-${a.riskLevel}">Risk: ${a.riskLevel}</span>
  <span class="badge-lvl" style="background:var(--surface2);color:var(--muted)">Bias: ${a.netBias}</span></div>
  <p class="ai-sum">${a.summary}</p><div class="siglist">${(a.signals||[]).map(s=>`<div class="sig">${s}</div>`).join("")}</div></div></div>`; }
function renderVault(d,out){ out.innerHTML=`<div class="vault-head"><h3>${d.name} ${d.isClosed?'<span class="short" style="font-size:12px">· closed</span>':''}</h3>
  <p class="desc">${d.description||"No description."}</p></div>
  <div class="cards">
    <div class="mini"><div class="k">APR</div><div class="v ${signCls(d.apr)}">${pct(d.apr)}</div></div>
    <div class="mini"><div class="k">Followers</div><div class="v">${d.followerCount}</div></div>
    <div class="mini"><div class="k">Leader fee</div><div class="v">${pct(d.leaderCommission)}</div></div>
    <div class="mini"><div class="k">Distributable</div><div class="v">${fmtUsdC(d.maxDistributable)}</div></div>
    <div class="mini"><div class="k">Withdrawable</div><div class="v">${fmtUsdC(d.maxWithdrawable)}</div></div>
    <div class="mini"><div class="k">Deposits</div><div class="v">${d.allowDeposits?"Open":"Closed"}</div></div></div>
  <div class="meta">Leader <a href="${hlLink(d.leader)}" target="_blank">${short(d.leader)}</a> · Vault ${short(d.vaultAddress)}</div>`; }
function renderVerdict(a,out){ out.innerHTML=`<div class="ai-panel"><div class="ai-bar">✦ AI verdict</div><div class="ai-body">

// Inline SVG sparkline generator — zero deps, matches the vanilla-JS philosophy.
function sparkSvg(points,width,h,color){
  if(!points.length) return `<svg width="${width}" height="${h}"></svg>`;
  const vals=points.map(p=>p.equity);
  const mn=Math.min(...vals), mx=Math.max(...vals);
  const range=mx-mn||1;
  const step=width/(points.length-1||1);
  const pts=points.map((p,i)=>`${(i*step).toFixed(1)},${(h-((p.equity-mn)/range)*(h-4)-2).toFixed(1)}`).join(" ");
  return `<svg width="${width}" height="${h}" style="display:block;margin-top:14px"><polyline fill="none" stroke="${color}" stroke-width="1.5" points="${pts}"/></svg>`;
}
// Underwater area SVG for drawdown
function ddSvg(points,width,h,color){
  if(!points.length) return `<svg width="${width}" height="${h}"></svg>`;
  const vals=points.map(p=>p.drawdown);
  const mn=Math.min(...vals); // most negative
  const range=Math.abs(mn)||1;
  const step=width/(points.length-1||1);
  const line=points.map((p,i)=>`${(i*step).toFixed(1)},${(Math.abs(p.drawdown)/range*(h-4)+2).toFixed(1)}`).join(" ");
  const area=`0,${h} `+line+` ${width},${h}`;
  return `<svg width="${width}" height="${h}" style="display:block;margin-top:14px">
    <polygon fill="${color}22" stroke="none" points="${area}"/>
    <polyline fill="none" stroke="${color}" stroke-width="1.5" points="${line}"/></svg>`;
}

$("#catGrid").innerHTML = order.map(id=>{ const s=SERVICES[id];
  return `<a class="svc-card" data-id="${id}" data-search="${(s.name+" "+s.desc).toLowerCase()}" href="/app?s=${id}">
    <div class="svc-meta">${s.meta.join("")}</div>
    <div class="svc-name">${s.name}</div>
    <div class="svc-desc">${s.desc}</div>
    <div class="try">Try this <span class="arr">→</span></div></a>`;
}).join("");

/* render one service into the workspace */
function select(id){
  const s=SERVICES[id];
  $("#wTitle").textContent=s.title;
  $("#wMeta").innerHTML=s.meta.join("");
  $("#wLead").textContent=s.lead;
  $("#wForm").innerHTML=s.form;
  $("#wOut").innerHTML="";
  const out=$("#wOut");
  const go=$("#go"); if(go) go.onclick=()=>s.run(out).catch(e=>err(out, (s.ai?"AI: ":"")+e.message));
  document.querySelectorAll("#wForm .chip").forEach(c=>c.onclick=()=>{ $("#in").value=c.dataset.val; });
  const inp=$("#in"); if(inp) inp.addEventListener("keydown",e=>{ if(e.key==="Enter") go.click(); });
}

/* view switching */
function showCatalog(){
  $("#workspace").hidden=true; $("#catalog").hidden=false;
  $("#crumb").textContent="/ APP";
  $("#svcSearch").value="";
  document.querySelectorAll("#catGrid .svc-card").forEach(c=>c.hidden=false);
  $("#catEmpty").hidden=true;
  window.scrollTo(0,0);
}
function showService(id){
  $("#catalog").hidden=true; $("#workspace").hidden=false;
  $("#crumb").textContent="/ "+SERVICES[id].name.toUpperCase();
  select(id);
  window.scrollTo(0,0);
}
function goToService(id){ history.pushState(null,"",`/app?s=${id}`); showService(id); }
function goToCatalog(){ history.pushState(null,"","/app"); showCatalog(); }

/* route from the URL (?s=…) and on back/forward */
function route(){ const id=new URLSearchParams(location.search).get("s");
  if(id && SERVICES[id]) showService(id); else showCatalog(); }

/* wire navigation: cards, back link */
document.querySelectorAll("#catGrid .svc-card").forEach(a=>a.addEventListener("click",e=>{ e.preventDefault(); goToService(a.dataset.id); }));
$("#backCatalog").addEventListener("click",e=>{ e.preventDefault(); goToCatalog(); });
window.addEventListener("popstate",route);

/* search the catalog; press "/" anywhere to jump into it */
const searchInput=$("#svcSearch");
searchInput.addEventListener("input",()=>{
  const q=searchInput.value.trim().toLowerCase();
  let shown=0;
  document.querySelectorAll("#catGrid .svc-card").forEach(c=>{
    const hit = !q || c.dataset.search.includes(q);
    c.hidden=!hit; if(hit) shown++;
  });
  $("#catEmpty").hidden = shown>0;
});
searchInput.addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    const visible=[...document.querySelectorAll("#catGrid .svc-card")].filter(c=>!c.hidden);
    if(visible.length) goToService(visible[0].dataset.id);
  }
});
document.addEventListener("keydown",e=>{
  if(e.key==="/" && !$("#catalog").hidden && !/^(input|select|textarea)$/i.test(document.activeElement.tagName)){
    e.preventDefault(); searchInput.focus();
  }
});

/* ai status + init */
(async()=>{ try{ aiOn=(await call("/ai/status")).enabled; }catch(e){}
  const g=$("#aiGhost"); g.textContent= aiOn?"● AI online":"○ AI offline"; g.style.color= aiOn?"var(--green)":"var(--faint)";
})();
route();
</script>
</body>
</html>
