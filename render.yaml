services:
  - type: web
    name: hyperscope
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      # set this in the Render dashboard to enable the AI endpoints (free key at build.nvidia.com)
      - key: NVIDIA_API_KEY
        sync: false
